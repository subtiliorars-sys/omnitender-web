<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTender POS — Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --pos-gold: #d4af37; }
        body {
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        header {
            width: 100%;
            padding: 18px 20px;
            text-align: center;
            background: #000;
            border-bottom: 2px solid var(--pos-gold);
        }
        header h1 {
            margin: 0;
            color: var(--pos-gold);
            font-size: 1.4rem;
        }
        .gear-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            background: none;
            border: 0;
            color: #666;
            font-size: 1.4rem;
            cursor: pointer;
            width: auto;
            min-height: 0;
            margin: 0;
            padding: 4px 8px;
            z-index: 10;
        }
        .gear-btn:hover { color: var(--pos-gold); }
        .pos-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%;
            max-width: 400px;
        }
        .amount-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: var(--space-xl);
            letter-spacing: 1px;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            width: 100%;
        }
        .keypad button {
            padding: 20px;
            font-size: 1.5rem;
            border: 0;
            border-radius: 12px;
            background: #333;
            color: #fff;
            cursor: pointer;
            width: auto;
            min-height: 0;
            margin: 0;
        }
        .keypad button:active { background: var(--pos-gold); }
        .btn-clear { background: #555; }
        .btn-pay {
            grid-column: span 3;
            background: var(--pos-gold);
            color: #000;
            font-weight: 800;
            margin-top: var(--space-md);
        }
        .btn-pay:hover { background: #e0b83e; }
        #payment-screen { display: none; text-align: center; }
        .qr-box {
            background: #fff;
            width: 250px;
            height: 250px;
            margin: var(--space-lg) auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: .9rem;
        }
        .pay-status {
            margin-top: var(--space-md);
            font-size: 1.1rem;
            color: var(--pos-gold);
        }
        .btn-cancel {
            background: #555;
            color: #fff;
            border: 0;
            border-radius: 10px;
            padding: 16px;
            font-size: 1.1rem;
            width: 100%;
            margin-top: var(--space-xl);
            cursor: pointer;
        }
        .btn-cancel:hover { background: #666; }
        #settings-panel {
            display: none;
            position: fixed;
            top: 60px;
            right: 16px;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: var(--space-md);
            min-width: 200px;
            z-index: 20;
        }
        #settings-panel.open { display: block; }
        #settings-panel p {
            margin: 0 0 var(--space-sm);
            color: #ccc;
            font-size: .85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>OmniTender POS</h1>
        <button class="gear-btn" id="gear-btn" aria-label="Settings">⚙</button>
    </header>

    <div id="settings-panel">
        <p style="font-weight:700;color:var(--pos-gold);margin-bottom:var(--space-sm);">Settings</p>
        <p>Currency: USDT/USDC</p>
        <p>Network: to be configured</p>
    </div>

    <div class="pos-container" id="keypad-screen">
        <div class="amount-display" id="display">$0.00</div>
        <div class="keypad">
            <button onclick="addDigit(1)">1</button>
            <button onclick="addDigit(2)">2</button>
            <button onclick="addDigit(3)">3</button>
            <button onclick="addDigit(4)">4</button>
            <button onclick="addDigit(5)">5</button>
            <button onclick="addDigit(6)">6</button>
            <button onclick="addDigit(7)">7</button>
            <button onclick="addDigit(8)">8</button>
            <button onclick="addDigit(9)">9</button>
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button onclick="addDigit(0)">0</button>
            <button onclick="addDigit('00')">00</button>
            <button class="btn-pay" onclick="showPayment()">Charge</button>
        </div>
    </div>

    <div class="pos-container" id="payment-screen">
        <h2 id="charge-amount" style="color:var(--pos-gold);margin-top:0;">Charging $0.00</h2>
        <div class="qr-box" id="qr-container">
            <div>Generating QR…</div>
        </div>
        <p style="color:#999;">Ask customer to scan to pay with USDT/USDC</p>
        <div class="pay-status" id="payment-status">Waiting for payment…</div>
        <button class="btn-cancel" onclick="resetPOS()">Cancel</button>
    </div>

    <script>
        let amount = "0";

        function updateDisplay() {
            const val = parseFloat(amount) / 100;
            document.getElementById('display').innerText = "$" + val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function addDigit(d) {
            if (amount === "0" && d !== "00") amount = d.toString();
            else amount += d.toString();
            if (amount.length > 9) amount = amount.slice(0, 9);
            updateDisplay();
        }

        function clearDisplay() {
            amount = "0";
            updateDisplay();
        }

        function showPayment() {
            if (amount === "0") return;
            const finalAmount = parseFloat(amount) / 100;
            document.getElementById('keypad-screen').style.display = 'none';
            document.getElementById('payment-screen').style.display = 'flex';
            document.getElementById('charge-amount').innerText = "Charging $" + finalAmount.toFixed(2);
            console.log("Requesting NOWPayments Invoice for: " + finalAmount);
        }

        function resetPOS() {
            amount = "0";
            updateDisplay();
            document.getElementById('keypad-screen').style.display = 'flex';
            document.getElementById('payment-screen').style.display = 'none';
        }

        (function () {
            var gear = document.getElementById('gear-btn');
            var panel = document.getElementById('settings-panel');
            if (gear && panel) {
                gear.addEventListener('click', function () {
                    panel.classList.toggle('open');
                });
                document.addEventListener('click', function (e) {
                    if (!panel.contains(e.target) && e.target !== gear) {
                        panel.classList.remove('open');
                    }
                });
            }
        })();
    </script>
</body>
</html>
