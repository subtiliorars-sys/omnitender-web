<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTender POS — Terminal</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f4f4f4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #000;
            border-bottom: 2px solid var(--gold);
        }
        h1 { margin: 0; color: var(--gold); font-size: 1.5rem; }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%;
            max-width: 400px;
        }
        .amount-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }
        button {
            padding: 20px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            background-color: #333;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background-color: var(--gold); }
        .btn-pay {
            grid-column: span 3;
            background-color: var(--gold);
            color: black;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-clear { background-color: #555; }
        
        #payment-screen {
            display: none;
            text-align: center;
        }
        .qr-placeholder {
            background-color: white;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border-radius: 10px;
        }
        .status {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <header>
        <h1>OmniTender POS</h1>
    </header>

    <div class="container" id="keypad-screen">
        <div class="amount-display" id="display">$0.00</div>
        <div class="keypad">
            <button onclick="addDigit(1)">1</button>
            <button onclick="addDigit(2)">2</button>
            <button onclick="addDigit(3)">3</button>
            <button onclick="addDigit(4)">4</button>
            <button onclick="addDigit(5)">5</button>
            <button onclick="addDigit(6)">6</button>
            <button onclick="addDigit(7)">7</button>
            <button onclick="addDigit(8)">8</button>
            <button onclick="addDigit(9)">9</button>
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button onclick="addDigit(0)">0</button>
            <button onclick="addDigit('00')">00</button>
            <button class="btn-pay" onclick="showPayment()">Charge Payment</button>
        </div>
    </div>

    <div class="container" id="payment-screen">
        <h2 id="charge-amount">Charging $0.00</h2>
        <div class="qr-placeholder" id="qr-container">
            <!-- QR code will be generated here -->
             <div style="color: black; padding-top: 100px;">Generating QR...</div>
        </div>
        <p>Ask customer to scan to pay with USDT/USDC</p>
        <div class="status" id="payment-status">Waiting for payment...</div>
        <button class="btn-clear" style="margin-top: 40px; width: 100%;" onclick="resetPOS()">Cancel</button>
    </div>

    <script>
        let amount = "0";

        function updateDisplay() {
            const val = parseFloat(amount) / 100;
            document.getElementById('display').innerText = "$" + val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function addDigit(d) {
            if (amount === "0" && d !== "00") amount = d.toString();
            else amount += d.toString();
            if (amount.length > 9) amount = amount.slice(0, 9);
            updateDisplay();
        }

        function clearDisplay() {
            amount = "0";
            updateDisplay();
        }

        function showPayment() {
            if (amount === "0") return;
            const finalAmount = parseFloat(amount) / 100;
            document.getElementById('keypad-screen').style.display = 'none';
            document.getElementById('payment-screen').style.display = 'block';
            document.getElementById('charge-amount').innerText = "Charging $" + finalAmount.toFixed(2);
            
            // Here we would call the NOWPayments API via a backend proxy
            console.log("Requesting NOWPayments Invoice for: " + finalAmount);
        }

        function resetPOS() {
            amount = "0";
            updateDisplay();
            document.getElementById('keypad-screen').style.display = 'flex';
            document.getElementById('payment-screen').style.display = 'none';
        }
    </script>
</body>
</html>
