name: Deploy Marketing Site to AWS S3 & CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Render Supabase config.js (publishable key only — never the secret key)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          sed \
            -e "s|__SUPABASE_URL__|${SUPABASE_URL}|g" \
            -e "s|__SUPABASE_PUBLISHABLE_KEY__|${SUPABASE_PUBLISHABLE_KEY}|g" \
            config.example.js > config.js

      - name: Sync static files to S3
        run: |
          aws s3 sync . s3://subtiliorars-omnitender-web-380592535426 \
            --exclude ".*" \
            --exclude "*/.*" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            --exclude "CLAUDE.md" \
            --exclude "config.example.js"

      - name: Remove orphaned pa/ pages from S3
        run: |
          aws s3 rm s3://subtiliorars-omnitender-web-380592535426/pa/ --recursive || true

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id E2MXZUPT4Y6JYE --paths "/*"
